<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Notary Jose favicon: fondo amber/burgundy + sello notarial estilizado.
       Sugiere formalidad / legalidad (círculo estrellado del stamp) sin
       usar texto. Alta contrast para 16x16 en tab. -->
  <rect width="64" height="64" rx="10" fill="#78350f"/>
  <!-- Outer ring del sello -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#fef3c7" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#fef3c7" stroke-width="1.5"/>
  <!-- Bold "J" en el centro -->
  <text
    x="32"
    y="42"
    font-family="Arial Black, 'Arial Black', Impact, system-ui, sans-serif"
    font-size="26"
    font-weight="900"
    fill="#fef3c7"
    text-anchor="middle"
    letter-spacing="-1">J</text>
</svg>
